<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <rect width="1600" height="1000" fill="#0b1020"/>
  <rect x="40" y="40" width="1520" height="920" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="70" y="86" font-family="Menlo, Consolas, monospace" font-size="22" fill="#d1d5db">repo /tmp/harness-demo | model local-worker | ticket gpt-5.3-codex | task - | run - | open tickets 1 | idle</text>
  <line x1="60" y1="110" x2="1540" y2="110" stroke="#334155"/>
  <text x="80" y="150" font-family="Menlo, Consolas, monospace" font-size="24" fill="#f9fafb">Transcript</text>
  <text x="990" y="150" font-family="Menlo, Consolas, monospace" font-size="24" fill="#f9fafb">Tickets</text>
  <line x1="940" y1="120" x2="940" y2="820" stroke="#334155"/>
  <text x="80" y="205" font-family="Menlo, Consolas, monospace" font-size="20" fill="#d1d5db">Welcome to harness.</text>
  <text x="80" y="245" font-family="Menlo, Consolas, monospace" font-size="20" fill="#d1d5db">Plain prompts start objectives. Use / for harness commands.</text>
  <text x="80" y="300" font-family="Menlo, Consolas, monospace" font-size="20" fill="#fbbf24">&gt; task list</text>
  <text x="80" y="335" font-family="Menlo, Consolas, monospace" font-size="20" fill="#fca5a5">Use /task to run harness commands; plain text starts an objective.</text>
  <text x="80" y="395" font-family="Menlo, Consolas, monospace" font-size="20" fill="#93c5fd">&gt; /task </text>
  <text x="80" y="430" font-family="Menlo, Consolas, monospace" font-size="20" fill="#d1d5db">completion candidates rendered in composer</text>
  <rect x="980" y="190" width="520" height="85" rx="10" fill="#1f2937" stroke="#64748b"/>
  <text x="1005" y="225" font-family="Menlo, Consolas, monospace" font-size="20" fill="#f9fafb">ticket_01KR...  open</text>
  <text x="1005" y="255" font-family="Menlo, Consolas, monospace" font-size="18" fill="#d1d5db">Which implementation path should be used?</text>
  <rect x="980" y="305" width="520" height="85" rx="10" fill="#1f2937" stroke="#64748b"/>
  <text x="1005" y="340" font-family="Menlo, Consolas, monospace" font-size="20" fill="#f9fafb">run_01KR...  stuck</text>
  <text x="1005" y="370" font-family="Menlo, Consolas, monospace" font-size="18" fill="#d1d5db">worker response persisted and redacted</text>
  <line x1="60" y1="820" x2="1540" y2="820" stroke="#334155"/>
  <text x="80" y="865" font-family="Menlo, Consolas, monospace" font-size="22" fill="#f9fafb">Composer</text>
  <text x="80" y="906" font-family="Menlo, Consolas, monospace" font-size="22" fill="#d1d5db">&gt; /task </text>
  <rect x="78" y="922" width="610" height="28" fill="#1e293b"/>
  <text x="90" y="943" font-family="Menlo, Consolas, monospace" font-size="18" fill="#bfdbfe">list       List tasks</text>
  <text x="370" y="943" font-family="Menlo, Consolas, monospace" font-size="18" fill="#bfdbfe">create     Create a task</text>
  <text x="700" y="943" font-family="Menlo, Consolas, monospace" font-size="18" fill="#bfdbfe">run        Run a task once</text>
  <text x="70" y="975" font-family="Menlo, Consolas, monospace" font-size="18" fill="#94a3b8">composer | idle | Tab complete | Ctrl-P/N pane | ? help | Ctrl-D exit</text>
</svg>
